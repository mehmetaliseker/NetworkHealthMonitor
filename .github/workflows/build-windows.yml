name: Build Windows Server Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore solution
        shell: pwsh
        run: dotnet restore .\NetworkHealthMonitor.sln

      - name: Build Release
        shell: pwsh
        run: dotnet build .\NetworkHealthMonitor.sln -c Release --no-restore

      - name: Test Release
        shell: pwsh
        run: dotnet test .\NetworkHealthMonitor.sln -c Release --no-build

      - name: Publish WPF UI
        shell: pwsh
        run: |
          dotnet publish .\NetworkHealthMonitor.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o .\publish\server\ui `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true `
            /p:DebugType=None `
            /p:DebugSymbols=false

      - name: Publish Worker Service
        shell: pwsh
        run: |
          dotnet publish .\NetworkHealthMonitor.Worker\NetworkHealthMonitor.Worker.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o .\publish\server\worker `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true `
            /p:DebugType=None `
            /p:DebugSymbols=false

      - name: Stage server package
        shell: pwsh
        run: |
          $stage = ".\publish\server-package"
          if (Test-Path $stage) {
            Remove-Item $stage -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path "$stage\ui", "$stage\worker", "$stage\scripts" | Out-Null
          Copy-Item .\publish\server\ui\NetworkHealthMonitor.exe "$stage\ui\"
          Copy-Item .\publish\server\worker\NetworkHealthMonitor.Worker.exe "$stage\worker\"
          Copy-Item .\scripts\install-service.ps1, .\scripts\uninstall-service.ps1, .\scripts\start-service.ps1, .\scripts\stop-service.ps1, .\scripts\service-status.ps1 "$stage\scripts\"
          Copy-Item .\README-SERVER.md "$stage\README-SERVER.md"

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetworkHealthMonitor-Server-win-x64
          path: publish/server-package
          if-no-files-found: error

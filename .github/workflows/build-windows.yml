name: Build Windows Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Find project file
        shell: pwsh
        run: |
          $project = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -First 1

          if ($null -eq $project) {
            throw "No .csproj file found."
          }

          "PROJECT_PATH=$($project.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Project found: $($project.FullName)"

      - name: Restore
        shell: pwsh
        run: dotnet restore "$env:PROJECT_PATH"

      - name: Build Release
        shell: pwsh
        run: dotnet build "$env:PROJECT_PATH" -c Release --no-restore

      - name: Publish Windows x64 self-contained
        shell: pwsh
        run: |
          dotnet publish "$env:PROJECT_PATH" `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:EnableCompressionInSingleFile=false `
            -o "$env:GITHUB_WORKSPACE\publish"

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetworkHealthMonitor-win-x64
          path: publish
